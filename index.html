<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cerebro 2 | Pablo Adrian Rivera Juvenal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; padding: 20px; }
        h1 { text-align: center; color: #222; }
        .nodo-activo { border: 2px solid #333; padding: 25px; margin: 20px auto; background: #f9f9f9; max-width: 600px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .red-svg { width: 100%; max-width: 800px; height: 500px; margin: 0 auto; display: block; }
        .node { stroke: #333; stroke-width: 1; cursor: pointer; transition: 0.3s; }
        .node:hover { filter: brightness(0.8); stroke-width: 2; }
        text { fill: #000; font-size: 9px; font-weight: bold; pointer-events: none; text-anchor: middle; }
        .line { stroke: #ccc; stroke-width: 1; }
        .sub-link { color: #555; display: block; margin: 5px 0; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Cerebro 2: Mapa de Conocimiento</h1>
    
    <svg class="red-svg" viewBox="0 0 800 500">
        <g id="nodos-container"></g>
    </svg>

    <div id="pantalla" class="nodo-activo">
        <h2>Nodo Central</h2>
        <p>Selecciona una rama para integrar o consultar información.</p>
    </div>

    <script>
        const temas = [
            { id: "filosofia", label: "FILOSOFÍA", color: "#FFB3BA" },
            { id: "derecho", label: "DERECHO", color: "#FFDFBA" },
            { id: "herbolaria", label: "HERBOLARIA", color: "#FFFFBA" },
            { id: "masoneria", label: "MASONERÍA", color: "#BAFFC9" },
            { id: "magia", label: "MAGIA", color: "#BAE1FF" },
            { id: "psicologia", label: "PSICOLOGÍA", color: "#E8BAFF" },
            { id: "sociologia", label: "SOCIOLOGÍA", color: "#FFBAF1" },
            { id: "pedagogia", label: "PEDAGOGÍA", color: "#BAFFEF" },
            { id: "geek", label: "GEEK", color: "#D1FFBA" },
            { id: "programacion", label: "PROGRAMACIÓN", color: "#BAF1FF" },
            { id: "ia", label: "IA", color: "#FFD1BA" }
        ];

        const filoSubtemas = [
            "Griega", "Helénica", "Medieval", "Renacimiento", "Modernidad", 
            "Alemana", "Francesa", "Inglesa", "Norteamericana", "Epistemología"
        ];

        const container = document.getElementById('nodos-container');
        const centerX = 400, centerY = 250, radius = 190;

        temas.forEach((tema, i) => {
            const angle = (i / temas.length) * 2 * Math.PI;
            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);

            container.innerHTML += `
                <line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" class="line" />
                <g onclick="mostrar('${tema.id}')">
                    <circle cx="${x}" cy="${y}" r="35" class="node" style="fill: ${tema.color};" />
                    <text x="${x}" y="${y + 3}">${tema.label}</text>
                </g>
            `;
        });

        function mostrar(id) {
            if (id === 'filosofia') {
                let html = `<h2>FILOSOFÍA</h2><p>Corrientes y periodos de estudio:</p>`;
                filoSubtemas.forEach(s => html += `<span class="sub-link">${s}</span>`);
                document.getElementById('pantalla').innerHTML = html;
            } else {
                document.getElementById('pantalla').innerHTML = `<h2>${id.toUpperCase()}</h2><p>Contenido en desarrollo para ${id}...</p>`;
            }
        }
    </script>
</body>
</html>
